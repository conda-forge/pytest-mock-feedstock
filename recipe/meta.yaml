{% set version = "3.15.1" %}

package:
  name: pytest-mock
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-mock/pytest_mock-{{ version }}.tar.gz
  sha256: 1849a238f6f396da19762269de72cb1814ab44416fa73a8686deac10b0d87a0f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
  run:
    - pytest >=6.2.5
    - python >={{ python_min }}

test:
  requires:
    - pip
    - pytest-asyncio
    - pytest >=7.0
    - python {{ python_min }}
  source_files:
    - tests
  imports:
    - pytest_mock
  commands:
    - pip check
    - pytest --help

about:
  home: https://github.com/pytest-dev/pytest-mock
  license: MIT
  license_file: LICENSE
  summary: Thin-wrapper around the mock package for easier use with py.test

extra:
  recipe-maintainers:
    - nicoddemus
