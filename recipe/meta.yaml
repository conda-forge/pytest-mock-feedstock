{% set version = "3.15.0" %}

package:
  name: pytest-mock
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-mock/pytest_mock-{{ version }}.tar.gz
  sha256: ab896bd190316b9d5d87b277569dfcdf718b2d049a2ccff5f7aca279c002a1cf

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
  run:
    - pytest >=5.0
    - python >={{ python_min }}

test:
  requires:
    - pip
    - pytest-asyncio
    - pytest >=7.0
    - python {{ python_min }}
  source_files:
    - tests
  imports:
    - pytest_mock
  commands:
    - pip check
    - pytest --help

about:
  home: https://github.com/pytest-dev/pytest-mock
  license: MIT
  license_file: LICENSE
  summary: Thin-wrapper around the mock package for easier use with py.test

extra:
  recipe-maintainers:
    - nicoddemus
